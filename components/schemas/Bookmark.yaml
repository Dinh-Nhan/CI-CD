type: object
required:
  - id
  - url
  - title
  - tags
  - created_at
  - updated_at
properties:
  id:
    type: string
    format: uuid
    description: ID duy nhất của bookmark
  url:
    type: string
    format: uri
    pattern: '^https?://'
    maxLength: 2048
    description: URL của bookmark. Chỉ chấp nhận scheme http hoặc https.
  title:
    type: string
    minLength: 1
    maxLength: 255
    description: Tiêu đề hiển thị của bookmark
  tags:
    type: array
    description: >
      Danh sách tags gắn với bookmark. Mỗi tag là unique,
      so sánh case-insensitive (ví dụ "Go" và "go" được coi là trùng nhau).
    items:
      type: string
      minLength: 1
      maxLength: 50
    uniqueItems: true
    maxItems: 50
  folder_id:
    type: string
    format: uuid
    nullable: true
    description: ID của folder chứa bookmark. null = không thuộc folder nào
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
