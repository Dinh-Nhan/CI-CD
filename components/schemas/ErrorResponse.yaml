type: object
required: [code, message]
properties:
  code:
    type: string
    description: Mã lỗi dạng string (ví dụ UNAUTHORIZED, NOT_FOUND, VALIDATION_ERROR)
  message:
    type: string
    description: Mô tả lỗi dạng human-readable
  trace_id:
    type: string
    description: ID để trace log trên server
  details:
    type: array
    description: Chi tiết lỗi validation (chỉ có trong 422)
    items:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
          description: Tên trường bị lỗi
        message:
          type: string
          description: Mô tả lỗi của trường đó
