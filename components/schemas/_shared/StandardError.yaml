#StandardError được sử dụng cho tất cả response.
type: object
required:
  - success
  - error
properties:
  success:
    type: boolean
    example: false
  error:
    type: object
    required:
      - code
      - message
    properties:
      code:
        type: integer
        description: "Mã lỗi nội bộ của hệ thống"
        example: 4200
      message:
        type: string
        example: "Dữ liệu không hợp lệ"
      data:
        type: object
        nullable: true