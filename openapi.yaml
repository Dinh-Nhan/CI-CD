openapi: 3.1.0
info:
  title: Bookmark API
  description: |
    API quản lý bookmark (CRUD, search, filter, pagination).

    ## Authentication
    Tất cả endpoint đều yêu cầu Bearer JWT token.
    Để public một endpoint (ví dụ health check), override `security: []` ở operation level.

    ## Conventions
    - `operationId` theo pattern: `{verb}{Noun}` (ví dụ `listBookmarks`, `createBookmark`)
    - Lỗi server (5xx) luôn kèm `trace_id` để phục vụ debug
    - `PATCH` chỉ cập nhật các field được gửi lên; field không gửi sẽ giữ nguyên
  version: 1.0.0
  contact:
    name: Đinh Nhân
    email: api@example.com

servers:
  - url: https://api.example.com
    description: Production
  - url: https://staging-api.example.com
    description: Staging
  - url: http://localhost:3000
    description: Local development

security:
  - BearerAuth: []

tags:
  - name: Bookmark
    description: Quản lý bookmark

paths:
  /bookmarks:
    $ref: './paths/bookmarks.yaml'
  /bookmarks/{id}:
    $ref: './paths/bookmarks_{id}.yaml'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Bookmark:
      $ref: './components/schemas/Bookmark.yaml'
    CreateBookmarkRequest:
      $ref: './components/schemas/CreateBookmarkRequest.yaml'
    UpdateBookmarkRequest:
      $ref: './components/schemas/UpdateBookmarkRequest.yaml'
    ApiResponseBookmark:
      $ref: './components/schemas/ApiResponseBookmark.yaml'
    PaginatedBookmarkResponse:
      $ref: './components/schemas/PaginatedBookmarkResponse.yaml'
    ErrorResponse:
      $ref: './components/schemas/ErrorResponse.yaml'
    ServerErrorResponse:
      $ref: './components/schemas/ServerErrorResponse.yaml'

  responses:
    Unauthorized:
      $ref: './components/responses/Unauthorized.yaml'
    NotFound:
      $ref: './components/responses/NotFound.yaml'
    UnprocessableEntity:
      $ref: './components/responses/UnprocessableEntity.yaml'
    InternalServerError:
      $ref: './components/responses/InternalServerError.yaml'
