name: API Governance

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
      - develop

jobs:
  # Job 1: Chỉ lint — chạy trên cả PR lẫn push
  lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Spectral Lint
        run: npx spectral lint openapi.yaml --ruleset .spectral.yaml

  # Job 2: Build docs — chỉ chạy khi push lên main, hoặc ngay khi tạo PR, sau khi lint pass
  build:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bundle OpenAPI
        run: npx redocly bundle openapi.yaml -o openapi-bundled.yaml

      - name: Build API Documentation
        run: npx redocly build-docs openapi-bundled.yaml -o api-docs.html

      - name: Prepare deployment folder
        run: |
          mkdir -p _site
          cp api-docs.html _site/index.html

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  # Job 3: Deploy — chỉ chạy sau khi build thành công
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # Cấp quyền để deploy lên GitHub Pages
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bundle OpenAPI
        run: npx redocly bundle openapi.yaml -o openapi-bundled.yaml

      - name: Build API Documentation
        run: npx redocly build-docs openapi-bundled.yaml -o api-docs.html

      - name: Prepare deployment folder
        run: |
          mkdir -p _site
          cp api-docs.html _site/index.html

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
