name: API CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  # Job 1: Chỉ lint — chạy trên cả PR lẫn push
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # =========================
      # 1. Spectral (style rules)
      # =========================
      - name: Run Spectral Lint
        run: npx spectral lint openapi.yaml --ruleset .spectral.yaml

      # =========================
      # 2. OpenAPI structural validation
      # =========================
      - name: Redocly OpenAPI Lint
        run: npx @redocly/cli lint openapi.yaml

  # Job 2: Build docs — chỉ chạy khi push lên main, hoặc ngay khi tạo PR, sau khi lint pass
  build:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bundle OpenAPI
        run: npx redocly bundle openapi.yaml -o openapi-bundled.yaml

      - name: Build API Documentation
        run: npx redocly build-docs openapi-bundled.yaml -o api-docs.html

      # PR Preview folder
      - name: Prepare PR preview folder
        run: |
          mkdir -p _site/pr-${{ github.event.number }}
          cp api-docs.html _site/pr-${{ github.event.number }}/index.html

      # Upload artifact (PR preview)
      - name: Upload PR Preview Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.number }}-docs
          path: _site
