name: API CI

on:
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Validate — lint và kiểm tra cấu trúc OpenAPI
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # =========================
      # 1. Spectral (style rules)
      # =========================
      - name: Run Spectral Lint
        run: npx spectral lint openapi.yaml --ruleset .spectral.yaml

      # =========================
      # 2. OpenAPI structural validation
      # =========================
      - name: Redocly OpenAPI Lint
        run: npx @redocly/cli lint openapi.yaml

  # Job 2: Build — chạy sau khi validate pass
  build:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bundle OpenAPI
        run: npx redocly bundle openapi.yaml -o openapi-bundled.yaml

      - name: Build API Documentation
        run: npx redocly build-docs openapi-bundled.yaml -o api-docs.html

      - name: Prepare PR preview folder
        run: |
          mkdir -p _site/pr-${{ github.event.number }}
          cp api-docs.html _site/pr-${{ github.event.number }}/index.html

      - name: Upload PR preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-${{ github.event.number }}
          path: _site
          retention-days: 7
