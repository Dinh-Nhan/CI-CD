name: API CI

on:
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate OpenAPI Specification
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # =========================
      # Formatting Validation
      # =========================
      # - name: Check YAML Formatting
      #   run: npm run check:format

      # =========================
      # Spectral Governance Rules
      # =========================
      - name: Run Spectral Lint
        run: npm run lint:api

      # =========================
      # OpenAPI Structural Validation
      # =========================
      - name: Run Redocly Validation
        run: npm run validate:api

  build:
    name: Build API Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # =========================
      # Bundle OpenAPI
      # =========================
      - name: Bundle OpenAPI Specification
        run: npm run bundle:api

      # =========================
      # Build Documentation
      # =========================
      - name: Build API Documentation
        run: npm run build:docs

      # =========================
      # Prepare Preview Artifact
      # =========================
      - name: Prepare Preview Folder
        run: |
          mkdir -p _site/pr-${{ github.event.number }}
          cp api-docs.html _site/pr-${{ github.event.number }}/index.html

      # =========================
      # Upload Artifact
      # =========================
      - name: Upload PR Preview Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-${{ github.event.number }}
          path: _site
          retention-days: 7
