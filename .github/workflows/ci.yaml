name: API CI

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/validate.yaml

  diff:
    needs: validate
    uses: ./.github/workflows/diff.yaml

  build:
    needs: [validate, diff]
    uses: ./.github/workflows/build.yaml
