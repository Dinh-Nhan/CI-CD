name: API CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  # Job 1: Chỉ lint — chạy trên cả PR lẫn push
  lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Spectral Lint
        run: npx spectral lint openapi.yaml --ruleset .spectral.yaml

  # Job 2: Build docs — chỉ chạy khi push lên main, hoặc ngay khi tạo PR, sau khi lint pass
  build:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bundle OpenAPI
        run: npx redocly bundle openapi.yaml -o openapi-bundled.yaml

      - name: Build API Documentation
        run: npx redocly build-docs openapi-bundled.yaml -o api-docs.html

      - name: Prepare deployment folder
        run: |
          mkdir -p _site
          cp api-docs.html _site/index.html

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
