name: Validate OpenAPI Specification
on:
  workflow_call:
  push:
    branches: [main, develop]
    paths:
      - "components/schemas/**"

jobs:
  validate:
    name: Validate OpenAPI Specification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [20]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Spectral Lint
        run: npm run lint:api

      - name: Run Redocly Validation
        run: npm run validate:api

  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: validate
    if: always()
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Lấy danh sách schema files thay đổi
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- 'components/schemas/**' | sed 's/^/• /' | paste -sd '\n')
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "${FILES:-_(không có)_}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Debug token
        run: |
          echo "Token length: ${#SLACK_BOT_TOKEN}"
          echo "Channel: ${SLACK_CHANNEL_ID}"

      - name: Gửi thông báo Slack
        run: |
          if [ "${{ needs.validate.result }}" = "success" ]; then
            TITLE="✅ Schema Update — Passed"
          else
            TITLE="❌ Schema Update — Failed"
          fi

          curl -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{
              \"channel\": \"${SLACK_CHANNEL_ID}\",
              \"text\": \"${TITLE}\",
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": { \"type\": \"plain_text\", \"text\": \"${TITLE}\" }
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    { \"type\": \"mrkdwn\", \"text\": \"*Repo:*\n${{ github.repository }}\" },
                    { \"type\": \"mrkdwn\", \"text\": \"*Branch:*\n\`${{ github.ref_name }}\`\" },
                    { \"type\": \"mrkdwn\", \"text\": \"*Author:*\n${{ github.actor }}\" },
                    { \"type\": \"mrkdwn\", \"text\": \"*Commit:*\n\`${{ github.sha }}\`\" }
                  ]
                },
                {
                  \"type\": \"actions\",
                  \"elements\": [
                    {
                      \"type\": \"button\",
                      \"text\": { \"type\": \"plain_text\", \"text\": \"Xem CI Run\" },
                      \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                    }
                  ]
                }
              ]
            }"
