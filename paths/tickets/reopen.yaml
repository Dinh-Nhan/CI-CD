post:
  summary: Mở lại ticket đã đóng
  operationId: reopenTicket
  description: >
    Mở lại một ticket đã đóng. Chỉ thực hiện được khi ticket
    đang ở trạng thái đóng (trangthai = 2) và thời gian đóng
    trong vòng 2 tháng gần nhất.
    Nếu không truyền descriptions, hệ thống tự điền "MỞ LẠI CÂU HỎI".
  tags:
    - Ticket
  security:
    - bearerAuth: []
  x-permission: CHECK_NEWUPDATE
  parameters:
    - $ref: "../../components/parameters/UserId.yaml"
    - $ref: "../../components/parameters/TicketId.yaml"
    - $ref: "../../components/parameters/XRequestId.yaml"
  requestBody:
    required: false
    content:
      multipart/form-data:
        schema:
          $ref: "../../components/schemas/ticket/ReopenTicketRequest.yaml"
  responses:
    "201":
      description: Mở lại ticket thành công
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/core/StandardSuccess.yaml"
          example:
            success: true
            data:
              type: [null]
            error:
              type: [null]
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "422":
          description: >
            4200 — dữ liệu không hợp lệ.
            4466 — quá thời hạn 2 tháng.
            4467 — ticket đang mở.
          content:
            application/json:
              schema:
                $ref: "../../components/schemas/core/StandardError.yaml"
              example:
                validationErrors:
                  summary: "Dữ liệu không hợp lệ"
                  value:
                    success: false
                    error:
                      code: 4200
                      message: "Dữ liệu request không hợp lệ"
                      data:
                        type: [null]
            expired:
              summary: "Quá thời hạn mở lại ticket"
              value:
                success: false
                error:
                  code: 4466
                  message: "Quá thời hạn mở lại"
                  data:
                    type: [null]
            alreadyOpen:
              summary: "Câu hỏi đang được mở"
              value:
                success: false
                error:
                  code: 4467
                  message: "Câu hỏi đang được mở"
                  data:
                    type: [null]
    "500":
      $ref: "../../components/responses/InternalServerError.yaml"
